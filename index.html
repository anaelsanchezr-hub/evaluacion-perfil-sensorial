    document.getElementById('fechaEvaluacion').valueAsDate = new Date();

    function calcularEdadExacta() {
        const nacStr = document.getElementById('fechaNacimiento').value;
        const evalStr = document.getElementById('fechaEvaluacion').value;
        if(!nacStr || !evalStr) return;
        
        const nac = new Date(nacStr);
        const eva = new Date(evalStr);
        let anos = eva.getFullYear() - nac.getFullYear();
        let meses = eva.getMonth() - nac.getMonth();
        let dias = eva.getDate() - nac.getDate();

        if (dias < 0) { meses--; dias += new Date(eva.getFullYear(), eva.getMonth(), 0).getDate(); }
        if (meses < 0) { anos--; meses += 12; }
        
        edadGlobalAnos = anos;
        edadGlobalMesesTotales = (anos * 12) + meses; // Cálculo de meses totales de vida

        document.getElementById('textoEdad').innerText = `Edad exacta: ${anos} años, ${meses} meses, ${dias} días (${edadGlobalMesesTotales} meses en total)`;
    }

    function iniciarEvaluacion() {
        const perfilSeleccionado = document.getElementById('tipoPerfil').value;
        const nombre = document.getElementById('nombre').value;
        
        if(!perfilSeleccionado || !nombre) { alert("Por favor, completa el nombre y selecciona un perfil."); return; }
        if(edadGlobalMesesTotales === 0 && document.getElementById('fechaNacimiento').value === "") { alert("Por favor, ingresa la fecha de nacimiento para calcular la edad."); return; }
        
        // VALIDACIONES DE EDAD (Candados de seguridad)
        if (perfilSeleccionado === 'spm_infant' && (edadGlobalMesesTotales < 4 || edadGlobalMesesTotales > 9)) {
            alert("Error: El formulario 'Infant' es exclusivo para bebés entre 4 y 9 meses. Verifica la edad."); return;
        }
        if (perfilSeleccionado === 'spm_toddler' && (edadGlobalMesesTotales < 10 || edadGlobalMesesTotales > 30)) {
            alert("Error: El formulario 'Toddler' es exclusivo para infantes entre 10 y 30 meses. Verifica la edad."); return;
        }
        
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.getElementById('pantalla-cuestionario').style.display = 'block';

        if (perfilSeleccionado === 'spm_child_home') {
            document.getElementById('titulo-cuestionario').innerText = "SPM-2: Home Form (Niños 5-12)";
            titulo_PDF_Activo = "REPORTE SPM-2 (HOME FORM 5-12 AÑOS)";
            cargarCuestionario(preguntas_Child_Home);
        } else if (perfilSeleccionado === 'spm_preschool_home') {
            document.getElementById('titulo-cuestionario').innerText = "SPM-2: Home Form (Preescolar 2-5)";
            titulo_PDF_Activo = `REPORTE SPM-2 (HOME PREESCOLAR - TABLA ${edadGlobalAnos <= 4 ? "2-4 AÑOS" : "5 AÑOS"})`;
            cargarCuestionario(preguntas_Preschool_Home);
        } else if (perfilSeleccionado === 'spm_infant') {
            document.getElementById('titulo-cuestionario').innerText = "SPM-2: Infant Form (4-9 meses)";
            titulo_PDF_Activo = `REPORTE SPM-2 (INFANT - TABLA ${edadGlobalMesesTotales <= 6 ? "4-6 MESES" : "7-9 MESES"})`;
            cargarCuestionario(preguntas_Infant);
        } else if (perfilSeleccionado === 'spm_toddler') {
            document.getElementById('titulo-cuestionario').innerText = "SPM-2: Toddler Form (10-30 meses)";
            titulo_PDF_Activo = `REPORTE SPM-2 (TODDLER - TABLA ${edadGlobalMesesTotales <= 20 ? "10-20 MESES" : "21-30 MESES"})`;
            cargarCuestionario(preguntas_Toddler);
        }
    }

    function cargarCuestionario(baseDeDatos) {
        const contenedor = document.getElementById('contenedorCuestionario');
        contenedor.innerHTML = ''; 
        
        baseDeDatos.forEach(pregunta => {
            let etiqueta = pregunta.inverso ? `<span class="etiqueta-inversa">Puntaje Inverso</span>` : '';
            
            const html = `
                <div class="item-pregunta">
                    <p>${pregunta.id}. ${pregunta.texto} ${etiqueta}</p>
                    <select class="respuesta-evaluacion" data-categoria="${pregunta.categoria}" data-inverso="${pregunta.inverso}">
                        <option value="" disabled selected>Selecciona una frecuencia...</option>
                        <option value="4">Siempre (4)</option>
                        <option value="3">Frecuentemente (3)</option>
                        <option value="2">Ocasionalmente (2)</option>
                        <option value="1">Nunca (1)</option>
                    </select>
                </div>
            `;
            contenedor.innerHTML += html;
        });
    }

    function calcularYGenerarPDF_SPM() {
        const perfilSeleccionado = document.getElementById('tipoPerfil').value;
        const respuestas = document.querySelectorAll('.respuesta-evaluacion');
        let todasRespondidas = true;
        let puntajes = { "vis": 0, "hea": 0, "tou": 0, "ts": 0, "bod": 0, "bal": 0, "pln": 0, "soc": 0 }; 

        respuestas.forEach(select => {
            if (select.value === "") {
                todasRespondidas = false;
            } else {
                let valor = parseInt(select.value);
                let esInverso = select.getAttribute('data-inverso') === "true";
                let categoria = select.getAttribute('data-categoria');

                if (esInverso) { valor = 5 - valor; }
                puntajes[categoria] += valor;
            }
        });

        if (!todasRespondidas) {
            alert("⚠️ Faltan preguntas por responder. Por favor, revisa el cuestionario.");
            return;
        }

        puntajes["st"] = puntajes.vis + puntajes.hea + puntajes.tou + puntajes.ts + puntajes.bod + puntajes.bal;

        // SELECCIÓN INTELIGENTE DEL BAREMO POR MESES/AÑOS
        if (perfilSeleccionado === 'spm_child_home') {
            baremos_Activos = baremos_Child_Home;
        } else if (perfilSeleccionado === 'spm_preschool_home') {
            baremos_Activos = (edadGlobalAnos <= 4) ? baremos_Preschool_Home_2_4 : baremos_Preschool_Home_5;
        } else if (perfilSeleccionado === 'spm_infant') {
            baremos_Activos = (edadGlobalMesesTotales <= 6) ? baremos_Infant_4_6 : baremos_Infant_7_9;
        } else if (perfilSeleccionado === 'spm_toddler') {
            baremos_Activos = (edadGlobalMesesTotales <= 20) ? baremos_Toddler_10_20 : baremos_Toddler_21_30;
        }

        generarReporteSPM(puntajes);
    }

    function obtenerClasificacionSPM(categoria, puntaje) {
        const rangos = baremos_Activos[categoria]; 
        for (let clasificacion in rangos) {
            if (puntaje >= rangos[clasificacion].min && puntaje <= rangos[clasificacion].max) {
                return clasificacion;
            }
        }
        return "Revisar Manual"; 
    }

    function generarReporteSPM(puntajes) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const nombre = document.getElementById('nombre').value;
        const edadTexto = document.getElementById('textoEdad').innerText.replace("Edad exacta: ", "");
        const fecha = document.getElementById('fechaEvaluacion').value;

        // Diseño del Encabezado
        doc.setFillColor(34, 166, 179); 
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14); 
        doc.text(titulo_PDF_Activo, 15, 20);
        
        doc.setFontSize(11);
        doc.text(`Nombre: ${nombre}`, 15, 30);
        doc.text(`Edad: ${edadTexto}`, 15, 36);
        doc.text(`Fecha: ${fecha}`, 130, 30);

        doc.setTextColor(50, 50, 50);
        doc.setFontSize(14);
        doc.text("Resultados por Escala Sensorial", 15, 55);

        const datosTabla = [
            ["Participación Social (SOC)", puntajes.soc, obtenerClasificacionSPM("soc", puntajes.soc)],
            ["Visión (VIS)", puntajes.vis, obtenerClasificacionSPM("vis", puntajes.vis)],
            ["Audición (HEA)", puntajes.hea, obtenerClasificacionSPM("hea", puntajes.hea)],
            ["Tacto (TOU)", puntajes.tou, obtenerClasificacionSPM("tou", puntajes.tou)],
            ["Gusto y Olfato (T&S)", puntajes.ts, obtenerClasificacionSPM("ts", puntajes.ts)],
            ["Conciencia Corporal (BOD)", puntajes.bod, obtenerClasificacionSPM("bod", puntajes.bod)],
            ["Equilibrio y Movimiento (BAL)", puntajes.bal, obtenerClasificacionSPM("bal", puntajes.bal)],
            ["Planificación e Ideas (PLN)", puntajes.pln, obtenerClasificacionSPM("pln", puntajes.pln)],
            ["TOTAL SENSORIAL (ST)", puntajes.st, obtenerClasificacionSPM("st", puntajes.st)]
        ];

        doc.autoTable({
            startY: 60,
            head: [['Escala', 'Puntaje Directo', 'Clasificación']],
            body: datosTabla,
            theme: 'striped',
            headStyles: { fillColor: [34, 166, 179] },
            didParseCell: function(data) {
                if (data.row.index === 8) {
                    data.cell.styles.fontStyle = 'bold';
                    data.cell.styles.fillColor = [240, 240, 240];
                }
                if (data.column.index === 2 && data.row.index !== 8) { 
                    if (data.cell.raw === "Típico") data.cell.styles.textColor = [46, 204, 113];
                    if (data.cell.raw === "Dificultades Moderadas") data.cell.styles.textColor = [241, 196, 15];
                    if (data.cell.raw === "Dificultades Severas") data.cell.styles.textColor = [231, 76, 60];
                }
            }
        });

        doc.save(`Reporte_SPM2_${nombre.replace(/ /g, "_")}.pdf`);
    }
</script>
