<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Evaluaciones Sensoriales</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f8f6fb 0%, #e8e2f4 100%); color: #332a5c; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 40px 20px; box-sizing: border-box; }
        .card { background: #ffffff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(90, 75, 129, 0.08); width: 100%; max-width: 700px; margin-bottom: 20px; }
        .header-app { text-align: center; margin-bottom: 30px; }
        .header-app h2 { color: #332a5c; font-weight: 700; font-size: 28px; margin: 0 0 10px 0; }
        .header-app p { color: #71698e; font-size: 14px; margin: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #5a4b81; }
        input, select { width: 100%; padding: 14px 16px; background-color: #f9f8fc; border: 1px solid #dcd6eb; border-radius: 12px; box-sizing: border-box; font-size: 14px; font-family: 'Poppins', sans-serif; color: #332a5c; transition: all 0.3s ease; }
        input:focus, select:focus { border-color: #8c7ae6; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(140, 122, 230, 0.15); outline: none; }
        .edad-calculada { font-size: 13px; color: #8c7ae6; background: #f0ecfa; padding: 10px 15px; border-radius: 8px; margin-top: -10px; margin-bottom: 20px; font-weight: 600; display: inline-block; }
        
        .btn-principal { background: linear-gradient(135deg, #6c5ce7 0%, #5a4b81 100%); color: white; border: none; padding: 16px 24px; font-size: 16px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 20px; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.25); transition: transform 0.2s; }
        .btn-principal:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(108, 92, 231, 0.35); }
        .btn-secundario { background: #e8e2f4; color: #5a4b81; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        
        #pantalla-cuestionario { display: none; } 
        .item-pregunta { background: #fdfcff; margin-bottom: 20px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .item-pregunta p { margin: 0 0 15px 0; font-weight: 500; font-size: 15px; }
        .etiqueta-inversa { font-size: 11px; background: #ffeaa7; color: #d63031; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="card" id="pantalla-inicio">
        <div class="header-app">
            <h2>Nueva Evaluación</h2>
            <p>Software de calificación automatizada - Múltiples Perfiles</p>
        </div>

        <form id="formInicio">
            <div class="form-group full-width">
                <label>Nombre completo del evaluado</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="fechaNacimiento" required onchange="calcularEdadExacta()">
                </div>
                <div class="form-group">
                    <label>Fecha de Evaluación</label>
                    <input type="date" id="fechaEvaluacion" required onchange="calcularEdadExacta()">
                </div>
            </div>

            <div class="edad-calculada" id="textoEdad">Esperando fechas...</div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="Mujer">Mujer</option>
                        <option value="Varón">Varón</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Profesional (Siglas)</label>
                    <input type="text" id="profesional" required placeholder="Ej. OSMI">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Selecciona el Perfil a evaluar</label>
                <select id="tipoPerfil" required>
                    <option value="" disabled selected>Elige el cuestionario correspondiente...</option>
                    <option value="spm_hogar">🏠 SPM - Formulario Hogar</option>
                    <option value="escolar">🎒 Perfil Sensorial 2 - Escolar (Próximamente)</option>
                </select>
            </div>

            <button type="button" class="btn-principal" onclick="iniciarEvaluacion()">Comenzar Cuestionario</button>
        </form>
    </div>

    <div class="card" id="pantalla-cuestionario">
        <button class="btn-secundario" onclick="volverInicio()">← Volver a los datos</button>
        <div class="header-app">
            <h2 id="titulo-cuestionario">Cuestionario</h2>
            <p>Responda la frecuencia de las siguientes conductas.</p>
        </div>
        
        <div id="contenedorCuestionario"></div>
        
        <button type="button" class="btn-principal" onclick="calcularYGenerarPDF_SPM()">Generar Reporte PDF (SPM)</button>
    </div>

<script>
    // --- 1. BASE DE DATOS LÓGICA SPM ---

    // Baremos de ejemplo para el SPM (Categorías: Típico, Problema, Disfunción)
    const baremosSPM = {
        "soc": { 
            "Desempeño Típico": { min: 0, max: 15 },
            "Algún Problema": { min: 16, max: 20 },
            "Disfunción Evidente": { min: 21, max: 50 } 
        },
        "vis": {
            "Desempeño Típico": { min: 0, max: 10 },
            "Algún Problema": { min: 11, max: 15 },
            "Disfunción Evidente": { min: 16, max: 50 }
        }
    };

    // Preguntas de prueba SPM (Nota la variable 'inverso')
    const preguntasSPM = [
        { id: 1, texto: "Participa apropiadamente en juegos y actividades con familiares y amigos.", categoria: "soc", inverso: true }, // Pregunta positiva = inverso
        { id: 2, texto: "Se frustra fácilmente al compartir juguetes o materiales.", categoria: "soc", inverso: false }, // Pregunta negativa = normal
        { id: 16, texto: "Muestra angustia ante luces brillantes (ej. luz del sol).", categoria: "vis", inverso: false }
    ];

    // --- 2. FUNCIONES DE INTERFAZ ---
    document.getElementById('fechaEvaluacion').valueAsDate = new Date();

    function calcularEdadExacta() {
        // (La misma lógica matemática de siempre para calcular la edad)
        const nacStr = document.getElementById('fechaNacimiento').value;
        const evalStr = document.getElementById('fechaEvaluacion').value;
        if(!nacStr || !evalStr) return;
        
        const nac = new Date(nacStr);
        const eva = new Date(evalStr);
        let anos = eva.getFullYear() - nac.getFullYear();
        let meses = eva.getMonth() - nac.getMonth();
        let dias = eva.getDate() - nac.getDate();

        if (dias < 0) { meses--; dias += new Date(eva.getFullYear(), eva.getMonth(), 0).getDate(); }
        if (meses < 0) { anos--; meses += 12; }
        document.getElementById('textoEdad').innerText = `Edad exacta: ${anos} años, ${meses} meses, ${dias} días`;
    }

    function iniciarEvaluacion() {
        const perfil = document.getElementById('tipoPerfil').value;
        const nombre = document.getElementById('nombre').value;
        if(!perfil || !nombre) { alert("Por favor, completa el nombre y selecciona un perfil."); return; }
        
        if (perfil === 'spm_hogar') {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-cuestionario').style.display = 'block';
            document.getElementById('titulo-cuestionario').innerText = "SPM - Cuestionario Hogar";
            cargarCuestionarioSPM();
        } else {
            alert("Este cuestionario está en construcción. Prueba el SPM.");
        }
    }

    function volverInicio() {
        document.getElementById('pantalla-inicio').style.display = 'block';
        document.getElementById('pantalla-cuestionario').style.display = 'none';
    }

    function cargarCuestionarioSPM() {
        const contenedor = document.getElementById('contenedorCuestionario');
        contenedor.innerHTML = ''; 
        
        // Renderizamos las preguntas del SPM con escala de 4 puntos
        preguntasSPM.forEach(pregunta => {
            let etiqueta = pregunta.inverso ? `<span class="etiqueta-inversa">Puntaje Inverso</span>` : '';
            
            const html = `
                <div class="item-pregunta">
                    <p>${pregunta.id}. ${pregunta.texto} ${etiqueta}</p>
                    <select class="respuesta-evaluacion" data-categoria="${pregunta.categoria}" data-inverso="${pregunta.inverso}">
                        <option value="" disabled selected>Selecciona una frecuencia...</option>
                        <option value="4">Siempre (4)</option>
                        <option value="3">Frecuentemente (3)</option>
                        <option value="2">Ocasionalmente (2)</option>
                        <option value="1">Nunca (1)</option>
                    </select>
                </div>
            `;
            contenedor.innerHTML += html;
        });
    }

    // --- 3. MOTOR DE CÁLCULO SPM Y PDF ---

    function calcularYGenerarPDF_SPM() {
        const respuestas = document.querySelectorAll('.respuesta-evaluacion');
        let todasRespondidas = true;
        
        // Alcancías para sumar los puntos del SPM
        let puntajes = { "soc": 0, "vis": 0 }; 

        respuestas.forEach(select => {
            if (select.value === "") {
                todasRespondidas = false;
            } else {
                let valor = parseInt(select.value);
                let esInverso = select.getAttribute('data-inverso') === "true";
                let categoria = select.getAttribute('data-categoria');

                // LA MAGIA MATEMÁTICA DEL PUNTAJE INVERSO
                if (esInverso) {
                    valor = 5 - valor; // Si elige 4 (Siempre), se convierte en 1. Si elige 1 (Nunca), se convierte en 4.
                }

                puntajes[categoria] += valor;
            }
        });

        if (!todasRespondidas) {
            alert("Responde todas las preguntas antes de generar el reporte.");
            return;
        }

        // Clasificar los resultados
        let clasificacionSOC = obtenerClasificacionSPM("soc", puntajes.soc);
        let clasificacionVIS = obtenerClasificacionSPM("vis", puntajes.vis);

        generarReporteSPM(puntajes, clasificacionSOC, clasificacionVIS);
    }

    function obtenerClasificacionSPM(categoria, puntaje) {
        const rangos = baremosSPM[categoria];
        for (let clasificacion in rangos) {
            if (puntaje >= rangos[clasificacion].min && puntaje <= rangos[clasificacion].max) {
                return clasificacion;
            }
        }
        return "Fuera de rango";
    }

    function generarReporteSPM(puntajes, classSOC, classVIS) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const nombre = document.getElementById('nombre').value;
        const edadTexto = document.getElementById('textoEdad').innerText.replace("Edad exacta: ", "");
        const fecha = document.getElementById('fechaEvaluacion').value;

        // Encabezado
        doc.setFillColor(34, 166, 179); // Color verdeazulado para el SPM
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("REPORTE SPM (HOGAR)", 15, 20);
        
        doc.setFontSize(11);
        doc.text(`Nombre: ${nombre}`, 15, 30);
        doc.text(`Edad: ${edadTexto}`, 15, 36);
        doc.text(`Fecha: ${fecha}`, 120, 30);

        // Tabla de Resultados SPM
        doc.setTextColor(50, 50, 50);
        doc.setFontSize(14);
        doc.text("Resultados por Escala", 15, 50);

        doc.autoTable({
            startY: 55,
            head: [['Escala', 'Puntaje Directo', 'Clasificación']],
            body: [
                ["Participación Social (SOC)", puntajes.soc, classSOC],
                ["Visión (VIS)", puntajes.vis, classVIS]
            ],
            theme: 'striped',
            headStyles: { fillColor: [104, 109, 224] } // Morado azulado
        });

        doc.save(`Reporte_SPM_${nombre.replace(/ /g, "_")}.pdf`);
    }
</script>

</body>
</html>

</body>
</html>
